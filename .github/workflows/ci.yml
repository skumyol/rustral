name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps
      # wgpu tests can abort on some Linux/NVIDIA stacks (driver/allocator); run core suite without it
      - run: cargo test --workspace --exclude rustral-wgpu-backend
      - name: rustral-wgpu-backend tests (non-blocking)
        run: cargo test -p rustral-wgpu-backend
        continue-on-error: true
      - run: cargo build --manifest-path examples/Cargo.toml --workspace
        # The standalone examples crate is currently broken (missing source files for declared bins);
        # treat its build as informational while the gap is being addressed separately.
        continue-on-error: true

  # Phase 2 P2: CPU benchmark artifact upload + schema validation.
  #
  # Timing numbers are noisy on shared CI runners; this job is therefore non-blocking on
  # performance regressions. It IS blocking on schema regressions: the produced JSON must
  # validate against `benchmarks/schema_v2.json`. Artifacts are kept for 14 days so a
  # reviewer can download the latest CPU run for any PR.
  bench-cpu:
    runs-on: ubuntu-latest
    needs: rust
    env:
      BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
      BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jsonschema for validator
        run: python -m pip install --upgrade pip jsonschema
      - name: Run CPU benchmarks (non-blocking on timing)
        env:
          RUSTRAL_BENCH_FEATURES: ""
          GIT_SHA: ${{ github.sha }}
        run: |
          python3 scripts/bench/run_all.py \
            --suite rustral --suite candle \
            --repeats 3 --warmup 1 \
            --out benchmarks/results/ci-${{ github.sha }}.json
        continue-on-error: true
      - name: Validate emitted JSON against schema v2
        run: |
          python3 scripts/bench/validate_schema.py benchmarks/results/ci-${{ github.sha }}.json
      - name: Verify benchmarks/runs/INDEX.md is in sync with manifests
        run: python3 scripts/bench/regen_index.py --check
      - name: Upload bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-cpu-${{ github.sha }}
          path: |
            benchmarks/results/ci-${{ github.sha }}.json
            benchmarks/results/summary.md
          retention-days: 14
      # Bencher.dev upload is opt-in: only runs when BENCHER_API_TOKEN is configured at the
      # repo / org level. We convert the schema-v2 JSON to Bencher Metric Format then call
      # the bencher CLI. If the secret is missing this step is a no-op.
      - name: Convert + upload to bencher.dev (optional)
        if: ${{ env.BENCHER_API_TOKEN != '' && env.BENCHER_PROJECT != '' }}
        run: |
          python3 scripts/bench/to_bencher_bmf.py \
            benchmarks/results/ci-${{ github.sha }}.json \
            benchmarks/results/ci-${{ github.sha }}.bmf.json
          curl --proto '=https' --tlsv1.3 -sSfL https://bencher.dev/download/install-cli.sh | sh
          ./bencher run \
            --project "$BENCHER_PROJECT" \
            --adapter json \
            --file benchmarks/results/ci-${{ github.sha }}.bmf.json \
            --branch "${GITHUB_REF_NAME:-main}" \
            --testbed gh-ubuntu-latest \
            --err

  # Phase 2 P1 smoke tests: real-corpus NLP examples run end-to-end with synthetic
  # pre-staged data and `--quick` mode. Exercises the SST-2 + WikiText-2 examples plus
  # their manifest writers and the `rustral-data` fetch/tokenizer surface (offline mode).
  nlp-smoke:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p rustral-runtime --features training --test sst2_smoke -- --include-ignored
      - run: cargo test -p rustral-runtime --features training --test wikitext2_lm_smoke -- --include-ignored
