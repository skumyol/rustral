name: nlp-real

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  nlp-real:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema for manifest validation
        run: python -m pip install --upgrade pip jsonschema

      - name: Cache rustral dataset cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/rustral
          key: rustral-cache-nlp-${{ runner.os }}-${{ hashFiles('crates/data/src/datasets/sst2.rs', 'crates/data/src/datasets/wikitext2.rs') }}
          restore-keys: |
            rustral-cache-nlp-${{ runner.os }}-

      - name: Build runtime examples
        run: cargo build --release -p rustral-runtime --features training --examples

      - name: Run real-data NLP (single seed, capped)
        env:
          CANDLE_FORCE_CPU: "1"
        run: |
          python3 scripts/eval/run_nlp_real.py \
            --seeds 0 \
            --out-root out/nlp_real_ci \
            --wikitext-train-tokens 50000 \
            --wikitext-train-windows 2000 \
            --wikitext-eval-windows 20000

      - name: Validate curated manifests
        run: |
          python3 scripts/bench/validate_manifest.py benchmarks/runs/v0.1.0/nlp/sst2.json benchmarks/runs/v0.1.0/nlp/wikitext2.json

      - name: Upload curated manifests
        uses: actions/upload-artifact@v4
        with:
          name: nlp-real-${{ github.sha }}
          path: |
            benchmarks/runs/v0.1.0/nlp/sst2.json
            benchmarks/runs/v0.1.0/nlp/wikitext2.json
          retention-days: 14

